# nginx configuration for reconfintech.com
# Deploy to /etc/nginx/sites-available/reconfintech.com
# Then: ln -s /etc/nginx/sites-available/reconfintech.com /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name reconfintech.com www.reconfintech.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name reconfintech.com www.reconfintech.com;

    # SSL certificates — replace with your actual paths
    ssl_certificate     /etc/ssl/certs/reconfintech.com.pem;
    ssl_certificate_key /etc/ssl/private/reconfintech.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Root directory — path to the built dist folder on your VPS
    root /var/www/reconfintech.com/current/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # Static assets with long-lived cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Favicon / logo
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # SPA fallback — all non-file routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
