# Nginx config for reconfintechconsultancy.com
# Place in /etc/nginx/sites-available/reconfintechconsultancy.com
# Then: sudo ln -s /etc/nginx/sites-available/reconfintechconsultancy.com /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name reconfintech.com www.reconfintech.com;

    # Uncomment after SSL is set up:
    # return 301 https://$host$request_uri;
}

